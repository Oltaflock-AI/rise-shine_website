# Verify every push/PR: types, money-path tests, production build.
# ESLint runs non-blocking until the pre-existing errors (SearchBar/CheckoutView
# effect patterns, voice-agent/) are cleared — flip continue-on-error off then.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Tests
        run: npm test
      - name: Build (no TBO/Razorpay creds — features degrade by design)
        run: npm run build
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
